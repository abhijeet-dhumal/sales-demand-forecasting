# Feast Feature Store Configuration
#
# This is a template configuration. When using the Feast Operator,
# the operator generates the actual config in the client ConfigMap.
#
# For local mode (01a-local.ipynb), this file is regenerated with
# cluster-specific connection strings.

project: sales_forecasting
provider: local

registry:
  registry_type: sql
  path: postgresql+psycopg2://feast:feast@postgres.feast-trainer-demo.svc.cluster.local:5432/feast
  cache_ttl_seconds: 60
  sqlalchemy_config:
    pool_pre_ping: true

offline_store:
  type: ray
  storage_path: /shared/data/ray_storage
  use_kuberay: true
  cluster_name: feast-ray
  kuberay_conf:
    namespace: feast-trainer-demo
    skip_tls: true
  broadcast_join_threshold_mb: 100
  enable_distributed_joins: true
  enable_ray_logging: false

batch_engine:
  type: ray.engine
  use_kuberay: true
  cluster_name: feast-ray
  kuberay_conf:
    namespace: feast-trainer-demo
    skip_tls: true
  enable_optimization: true
  enable_ray_logging: false

online_store:
  type: redis
  connection_string: redis.feast-trainer-demo.svc.cluster.local:6379

entity_key_serialization_version: 3
