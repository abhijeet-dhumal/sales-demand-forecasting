# KServe InferenceService for Sales Forecasting
# Deploys the trained model with Feast feature lookup integration
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: sales-forecast
  namespace: feast-trainer-demo
  labels:
    app: sales-forecasting
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 3
    containers:
    - name: kserve-container
      image: quay.io/modh/training:py312-cuda128-torch280
      command: ["/bin/bash", "-c"]
      args:
      - pip install -q kserve joblib scikit-learn && python /scripts/serve.py
      ports:
      - containerPort: 8080
        protocol: TCP
      env:
      - name: MODEL_DIR
        value: /shared/models
      - name: FEAST_SERVER_URL
        value: http://feast-server.feast-trainer-demo.svc.cluster.local:6566
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
      readinessProbe:
        httpGet:
          path: /v2/health/ready
          port: 8080
        initialDelaySeconds: 60
        periodSeconds: 10
      volumeMounts:
      - name: scripts
        mountPath: /scripts
      - name: model-storage
        mountPath: /shared
    volumes:
    - name: scripts
      configMap:
        name: sales-forecast-serve
    - name: model-storage
      persistentVolumeClaim:
        claimName: shared
---
apiVersion: v1
kind: Service
metadata:
  name: sales-forecast-external
  namespace: feast-trainer-demo
spec:
  selector:
    serving.kserve.io/inferenceservice: sales-forecast
  ports:
  - name: http
    port: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sales-forecast
  namespace: feast-trainer-demo
spec:
  to:
    kind: Service
    name: sales-forecast-external
  port:
    targetPort: http
  tls:
    termination: edge
