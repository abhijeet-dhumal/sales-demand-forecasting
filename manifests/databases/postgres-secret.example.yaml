# PostgreSQL Secret Template
#
# Copy this file to postgres-secret.yaml and replace placeholder values:
#   cp postgres-secret.example.yaml postgres-secret.yaml
#
# Generate secure passwords:
#   openssl rand -base64 16
#
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: feast-trainer-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: sales-forecasting-mlops
type: Opaque
stringData:
  # PostgreSQL credentials - REPLACE THESE VALUES
  POSTGRES_DB: feast
  POSTGRES_USER: feast
  POSTGRES_PASSWORD: <GENERATE_SECURE_PASSWORD>
  
  # Additional keys for compatibility
  host: postgres.feast-trainer-demo.svc.cluster.local
  port: "5432"
  username: feast
  password: <GENERATE_SECURE_PASSWORD>
  database: feast
  
  # Admin password for database initialization
  POSTGRES_ADMIN_PASSWORD: <GENERATE_SECURE_ADMIN_PASSWORD>
