# PostgreSQL - Shared database for Feast Registry + MLflow
#
# Used by:
#   - Feast: Registry (type: sql)
#   - MLflow: Experiment tracking
#
# PRODUCTION NOTE: Replace Secret with External Secrets Operator
#
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: feast-trainer-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: sales-forecasting-mlops
type: Opaque
stringData:
  # Standard format (used by Feast data-stores secret)
  # IMPORTANT: Replace these placeholder values before deploying!
  # Generate secure password: openssl rand -base64 16
  POSTGRES_DB: feast
  POSTGRES_USER: feast
  POSTGRES_PASSWORD: <CHANGE_ME>
  # Additional keys for compatibility
  host: postgres.feast-trainer-demo.svc.cluster.local
  port: "5432"
  username: feast
  password: <CHANGE_ME>
  database: feast
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: feast-trainer-demo
  labels:
    app.kubernetes.io/name: postgres
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: feast-trainer-demo
  labels:
    app.kubernetes.io/name: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: feast-trainer-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: sales-forecasting-mlops
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: registry.redhat.io/rhel9/postgresql-15:latest
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        env:
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: POSTGRESQL_ADMIN_PASSWORD
          value: postgres123
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/pgsql/data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 2Gi
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE"]
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE"]
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  namespace: feast-trainer-demo
  labels:
    app.kubernetes.io/name: postgres-init
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init
        image: registry.redhat.io/rhel9/postgresql-15:latest
        env:
        - name: PGHOST
          value: postgres
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h $PGHOST -U postgres; do sleep 2; done
          echo "Creating MLflow database..."
          PGPASSWORD=$POSTGRESQL_ADMIN_PASSWORD psql -h $PGHOST -U postgres -c "CREATE DATABASE mlflow OWNER feast;" 2>/dev/null || echo "mlflow exists"
          echo "Database ready!"
