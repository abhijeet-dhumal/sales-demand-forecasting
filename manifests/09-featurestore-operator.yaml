# FeatureStore CR using Feast Operator with Ray + PostgreSQL
# Uses custom-built image: quay.io/abdhumal/feast-ray-server
# Build with: oc start-build feast-ray-server -n feast-trainer-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: feast-offline-ray-config
  namespace: feast-trainer-demo
type: Opaque
stringData:
  ray: |
    ray_address: "ray://feast-ray-head-svc.feast-trainer-demo.svc.cluster.local:10001"
    storage_path: /shared/data
    broadcast_join_threshold_mb: 50
    max_parallelism_multiplier: 2
    target_partition_size_mb: 32
    enable_ray_logging: true
---
apiVersion: v1
kind: Secret
metadata:
  name: feast-online-postgres-config
  namespace: feast-trainer-demo
type: Opaque
stringData:
  postgres: |
    host: postgres.feast-trainer-demo.svc.cluster.local
    port: 5432
    database: feast
    user: feast
    password: feast123
---
apiVersion: v1
kind: Secret
metadata:
  name: feast-registry-sql-config
  namespace: feast-trainer-demo
type: Opaque
stringData:
  sql: |
    path: postgresql+psycopg://feast:feast123@postgres.feast-trainer-demo.svc.cluster.local:5432/feast
    cache_ttl_seconds: 60
---
apiVersion: feast.dev/v1
kind: FeatureStore
metadata:
  name: sales-forecasting
  namespace: feast-trainer-demo
  labels:
    app: sales-forecasting
    feature-store-ui: enabled
spec:
  feastProject: sales_forecasting
  feastProjectDir:
    git:
      url: https://github.com/abhijeet-dhumal/sales-demand-forecasting.git
      ref: main
      featureRepoPath: feature_repo
  services:
    # Ray offline store with custom image
    offlineStore:
      persistence:
        store:
          type: ray
          secretRef:
            name: feast-offline-ray-config
      server:
        image: quay.io/abdhumal/feast-ray-server:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
    # PostgreSQL online store
    onlineStore:
      persistence:
        store:
          type: postgres
          secretRef:
            name: feast-online-postgres-config
      server:
        image: quay.io/abdhumal/feast-ray-server:latest
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
    # File-based registry (avoids Python version conflicts)
    registry:
      local:
        server:
          image: quay.io/abdhumal/feast-ray-server:latest
          restAPI: true
    # UI with custom image
    ui:
      image: quay.io/abdhumal/feast-ray-server:latest
