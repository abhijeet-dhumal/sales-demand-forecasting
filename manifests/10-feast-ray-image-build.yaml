# OpenShift BuildConfig for Feast with Ray support
# This builds a custom image that includes feast[ray,postgres]
# Pushes to quay.io/abdhumal/feast-ray-server
#
# Prerequisites:
#   kubectl create secret generic quay-push-secret \
#     --from-file=.dockerconfigjson=$HOME/.config/containers/auth.json \
#     --type=kubernetes.io/dockerconfigjson -n feast-trainer-demo
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: feast-ray-server
  namespace: feast-trainer-demo
  labels:
    app: feast-ray-server
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: feast-ray-server
  namespace: feast-trainer-demo
  labels:
    app: feast-ray-server
spec:
  output:
    to:
      kind: DockerImage
      name: quay.io/abdhumal/feast-ray-server:latest
    pushSecret:
      name: quay-push-secret
  source:
    type: Dockerfile
    dockerfile: |
      # Feast Feature Server with Ray support
      # Base: OpenShift AI Ray image (has Ray pre-installed)
      FROM --platform=linux/amd64 quay.io/modh/ray:2.52.1-py312-cu128

      USER root

      # Install Feast with Ray, PostgreSQL, and gRPC support
      # grpcio extra includes: grpcio, grpcio-reflection, grpcio-health-checking
      RUN pip install --no-cache-dir \
          'feast[postgres,ray,grpcio]==0.59.0' \
          psycopg2-binary \
          uvicorn \
          'codeflare-sdk==0.35.0'

      # Create directories with proper permissions
      # Fix UI directory permissions (feast ui writes to build directory)
      RUN mkdir -p /feast-data /feast && \
          chmod -R 777 /feast-data /feast && \
          chmod -R 777 /opt/app-root/lib64/python3.12/site-packages/feast/ui/build || true

      WORKDIR /feast

      # Default command for feature server
      CMD ["feast", "serve", "-h", "0.0.0.0", "-p", "6566"]

      EXPOSE 6566 6567 8816
  strategy:
    type: Docker
    dockerStrategy:
      forcePull: false
      from:
        kind: DockerImage
        name: quay.io/modh/ray:2.52.1-py312-cu128
      buildArgs:
      - name: TARGETPLATFORM
        value: linux/amd64
  triggers:
  - type: ConfigChange
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
