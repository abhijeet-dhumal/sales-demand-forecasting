# MLflow OAuth Proxy Secret Template
#
# Copy this file to mlflow-secrets.yaml and replace placeholder values:
#   cp mlflow-secrets.example.yaml mlflow-secrets.yaml
#
# Generate session secret:
#   openssl rand -hex 16
#
---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-oauth-proxy-secret
  namespace: redhat-ods-applications
  annotations:
    kubernetes.io/description: "Session secret for OAuth proxy"
stringData:
  # 32-character hex string (16 bytes) for AES encryption
  # Generate with: openssl rand -hex 16
  session_secret: "<GENERATE_WITH_openssl_rand_-hex_16>"
