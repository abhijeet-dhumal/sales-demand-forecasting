# Sales Forecasting MLOps Pipeline
#
# Deploy all infrastructure:
#   oc apply -k manifests/
#
# Or deploy by component:
#   oc apply -f manifests/base/
#   oc apply -f manifests/databases/
#   oc apply -f manifests/ray/
#   oc apply -f manifests/feast/
#   oc apply -f manifests/mlflow/
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: feast-trainer-demo

labels:
- pairs:
    app.kubernetes.io/part-of: sales-forecasting-mlops
  includeSelectors: false

resources:
# === Base Infrastructure ===
- base/namespace.yaml
- base/shared-pvc.yaml
- base/config.yaml

# === Databases ===
- databases/postgres.yaml
- databases/redis.yaml

# === Distributed Compute ===
- ray/rbac.yaml
- ray/raycluster.yaml

# === Feature Store ===
- feast/data-stores-secret.yaml
- feast/featurestore.yaml

# === Experiment Tracking ===
- mlflow/mlflow.yaml

# === Observability ===
- observability/policies.yaml

# === Jobs (apply separately - alternatives to notebooks) ===
# oc apply -f manifests/feast/dataprep-scripts-configmap.yaml
# oc apply -f manifests/feast/dataprep-job.yaml
# oc apply -f manifests/training/training-script-configmap.yaml
# oc apply -f manifests/training/trainjob.yaml
# oc apply -f manifests/serving/serve-configmap.yaml
# oc apply -f manifests/serving/kserve-inference.yaml
