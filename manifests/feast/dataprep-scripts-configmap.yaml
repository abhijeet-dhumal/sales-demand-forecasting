# Feast Data Preparation Scripts ConfigMap
#
# Contains all scripts for Feast feature store setup:
# - feature_store.yaml: Feast configuration (Ray + PostgreSQL)
# - features.py: Feature definitions (entities, views, services)
# - data_generator.py: Synthetic sales data generator
# - run.sh: Main execution script
#
# Used by: dataprep-job.yaml
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: feast-dataprep-scripts
  namespace: feast-trainer-demo
  labels:
    app: feast-dataprep
    pipeline: sales-forecasting
data:
  # Feast Feature Store Configuration
  # Ray offline store + PostgreSQL online store
  feature_store.yaml: |
    project: sales_forecasting
    provider: local
    
    registry:
      registry_type: sql
      path: postgresql+psycopg2://feast:feast123@postgres.feast-trainer-demo.svc.cluster.local:5432/feast
      cache_ttl_seconds: 60
    
    # Ray offline store for distributed operations
    offline_store:
      type: ray
      storage_path: /shared/data/ray_storage
      use_kuberay: true
      kuberay_conf:
        cluster_name: feast-ray
        namespace: feast-trainer-demo
        skip_tls: true
      broadcast_join_threshold_mb: 100
      enable_distributed_joins: true
      enable_ray_logging: false
    
    # Ray batch engine for distributed materialization
    batch_engine:
      type: ray.engine
      use_kuberay: true
      kuberay_conf:
        cluster_name: feast-ray
        namespace: feast-trainer-demo
        skip_tls: true
    
    # PostgreSQL online store for low-latency serving
    online_store:
      type: postgres
      host: postgres.feast-trainer-demo.svc.cluster.local
      port: 5432
      database: feast
      user: feast
      password: <CHANGE_ME>  # Must match postgres-secret POSTGRES_PASSWORD
    
    entity_key_serialization_version: 3

  # Feature Definitions for Sales Forecasting
  features.py: |
    """
    Feature Definitions for Sales Forecasting
    
    Features:
    - Lag features: lag_1, lag_2, lag_4, lag_8
    - Rolling stats: rolling_mean_4w, rolling_std_4w, sales_vs_avg
    - Temporal: week_of_year, month, quarter, week_of_month, is_month_end
    - Holiday: is_holiday, days_to_holiday
    - Economic: temperature, fuel_price, cpi, unemployment
    """
    import os
    from datetime import timedelta
    from feast import Entity, FeatureView, Field, FileSource, FeatureService
    from feast.on_demand_feature_view import on_demand_feature_view
    from feast.types import Float32, Float64, Int32, Int64, String
    from feast.value_type import ValueType
    
    # Auto-configure CodeFlare SDK auth from service account
    def _setup_ray_auth():
        if os.environ.get("FEAST_RAY_AUTH_TOKEN"):
            return
        token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        if os.path.exists(token_path):
            with open(token_path) as f:
                os.environ["FEAST_RAY_AUTH_TOKEN"] = f.read().strip()
        if not os.environ.get("FEAST_RAY_AUTH_SERVER"):
            k8s_host = os.environ.get("KUBERNETES_SERVICE_HOST")
            k8s_port = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
            if k8s_host:
                os.environ["FEAST_RAY_AUTH_SERVER"] = f"https://{k8s_host}:{k8s_port}"
        if not os.environ.get("FEAST_RAY_SKIP_TLS"):
            os.environ["FEAST_RAY_SKIP_TLS"] = "true"
    
    _setup_ray_auth()
    
    # Entities
    store = Entity(name="store_id", join_keys=["store_id"], value_type=ValueType.INT32)
    department = Entity(name="dept_id", join_keys=["dept_id"], value_type=ValueType.INT32)
    
    # Sales features
    sales_features = FeatureView(
        name="sales_features",
        description="Weekly sales with lag, rolling, temporal, and economic features",
        entities=[store, department],
        ttl=timedelta(days=90),
        schema=[
            Field(name="weekly_sales", dtype=Float32),
            Field(name="lag_1", dtype=Float32),
            Field(name="lag_2", dtype=Float32),
            Field(name="lag_4", dtype=Float32),
            Field(name="lag_8", dtype=Float32),
            Field(name="rolling_mean_4w", dtype=Float32),
            Field(name="rolling_std_4w", dtype=Float32),
            Field(name="sales_vs_avg", dtype=Float32),
            Field(name="week_of_year", dtype=Int32),
            Field(name="month", dtype=Int32),
            Field(name="quarter", dtype=Int32),
            Field(name="week_of_month", dtype=Int32),
            Field(name="is_month_end", dtype=Int32),
            Field(name="is_holiday", dtype=Int32),
            Field(name="days_to_holiday", dtype=Int32),
            Field(name="temperature", dtype=Float32),
            Field(name="fuel_price", dtype=Float32),
            Field(name="cpi", dtype=Float32),
            Field(name="unemployment", dtype=Float32),
        ],
        source=FileSource(path="/shared/data/sales_features.parquet", timestamp_field="event_timestamp"),
        online=True,
    )
    
    # Store features
    store_features = FeatureView(
        name="store_features",
        description="Store metadata",
        entities=[store, department],
        ttl=timedelta(days=365),
        schema=[
            Field(name="store_type", dtype=String),
            Field(name="store_size", dtype=Int64),
            Field(name="region", dtype=String),
        ],
        source=FileSource(path="/shared/data/store_features.parquet", timestamp_field="event_timestamp"),
        online=True,
    )
    
    # On-demand features
    @on_demand_feature_view(
        sources=[sales_features, store_features],
        schema=[
            Field(name="sales_per_sqft", dtype=Float64),
            Field(name="momentum", dtype=Float64),
        ],
        mode="python",
        singleton=True,
    )
    def derived_features(inputs: dict) -> dict:
        weekly_sales = float(inputs.get("weekly_sales") or 0)
        store_size = float(inputs.get("store_size") or 1) or 1
        lag_1 = float(inputs.get("lag_1") or 1) or 1
        return {
            "sales_per_sqft": weekly_sales / store_size,
            "momentum": (weekly_sales - lag_1) / lag_1,
        }
    
    # Feature Services
    training_features = FeatureService(
        name="training_features",
        description="Features for model training (includes target)",
        features=[
            sales_features[[
                "weekly_sales", "lag_1", "lag_2", "lag_4", "lag_8",
                "rolling_mean_4w", "rolling_std_4w", "sales_vs_avg",
                "week_of_year", "month", "quarter", "week_of_month", "is_month_end",
                "is_holiday", "days_to_holiday",
                "temperature", "fuel_price", "cpi", "unemployment",
            ]],
            store_features[["store_type", "store_size", "region"]],
        ],
    )
    
    inference_features = FeatureService(
        name="inference_features",
        description="Features for inference (excludes target)",
        features=[
            sales_features[[
                "lag_1", "lag_2", "lag_4", "lag_8",
                "rolling_mean_4w", "rolling_std_4w", "sales_vs_avg",
                "week_of_year", "month", "quarter", "week_of_month", "is_month_end",
                "is_holiday", "days_to_holiday",
                "temperature", "fuel_price", "cpi", "unemployment",
            ]],
            store_features[["store_type", "store_size", "region"]],
            derived_features,
        ],
    )

  # Data generator script
  data_generator.py: |
    """
    Sales Data Generator with Feature Engineering
    
    Generates synthetic sales data with:
    - Lag features, rolling statistics
    - Temporal and holiday features
    - Economic indicators
    """
    import os
    import json
    import pandas as pd
    import numpy as np
    from datetime import datetime, timedelta, timezone
    from pathlib import Path
    
    print("=" * 60)
    print("SALES DATA GENERATOR")
    print("=" * 60)
    
    config = json.loads(os.getenv("DATA_CONFIG", '{"start_date": "2022-01-01", "weeks": 104, "stores": 45, "departments": 14, "seed": 42}'))
    data_dir = os.getenv("DATA_DIR", "/shared/data")
    
    np.random.seed(config.get("seed", 42))
    base_date = datetime.fromisoformat(config["start_date"]).replace(tzinfo=timezone.utc)
    
    MAJOR_HOLIDAYS = {6: "Super Bowl", 47: "Thanksgiving", 51: "Christmas", 52: "New Year", 27: "July 4th", 36: "Labor Day"}
    
    print(f"Generating: {config['weeks']} weeks x {config['stores']} stores x {config['departments']} depts")
    
    records = []
    for week in range(config["weeks"]):
        week_date = base_date + timedelta(weeks=week)
        week_of_year = week_date.isocalendar()[1]
        month = week_date.month
        quarter = (month - 1) // 3 + 1
        week_of_month = min(5, (week_date.day - 1) // 7 + 1)
        
        next_month = (week_date.replace(day=28) + timedelta(days=4)).replace(day=1)
        is_month_end = int((next_month - week_date).days <= 7)
        is_holiday = int(week_of_year in MAJOR_HOLIDAYS)
        
        days_to_holiday = 365
        for hw in MAJOR_HOLIDAYS.keys():
            days_diff = (hw - week_of_year) % 52
            if days_diff > 0:
                days_to_holiday = min(days_to_holiday, days_diff * 7)
        
        seasonal = 1 + 0.3 * np.sin(2 * np.pi * week_of_year / 52)
        holiday_boost = 1.5 if is_holiday else 1.0
        
        for store_id in range(1, config["stores"] + 1):
            store_base = 50000 + store_id * 5000
            for dept_id in range(1, config["departments"] + 1):
                dept_factor = 0.5 + dept_id * 0.2
                noise = np.random.normal(0, 2000)
                
                records.append({
                    "store_id": store_id,
                    "dept_id": dept_id,
                    "event_timestamp": week_date,
                    "weekly_sales": round(max(0, store_base * dept_factor * seasonal * holiday_boost + noise), 2),
                    "week_of_year": week_of_year,
                    "month": month,
                    "quarter": quarter,
                    "week_of_month": week_of_month,
                    "is_month_end": is_month_end,
                    "is_holiday": is_holiday,
                    "days_to_holiday": days_to_holiday,
                    "temperature": round(60 + 20 * np.sin(2 * np.pi * week_of_year / 52) + np.random.normal(0, 5), 1),
                    "fuel_price": round(3 + 0.5 * np.random.random(), 2),
                    "cpi": round(220 + week * 0.1, 1),
                    "unemployment": round(5 + np.random.normal(0, 0.5), 1)
                })
    
    Path(data_dir).mkdir(parents=True, exist_ok=True)
    
    print("Building DataFrame and computing features...")
    sales_df = pd.DataFrame(records)
    sales_df = sales_df.sort_values(["store_id", "dept_id", "event_timestamp"]).reset_index(drop=True)
    
    # Lag features
    for lag in [1, 2, 4, 8]:
        sales_df[f"lag_{lag}"] = sales_df.groupby(["store_id", "dept_id"])["weekly_sales"].shift(lag)
    
    # Rolling statistics
    grouped = sales_df.groupby(["store_id", "dept_id"])["weekly_sales"]
    sales_df["rolling_mean_4w"] = grouped.transform(lambda x: x.rolling(4, min_periods=1).mean())
    sales_df["rolling_std_4w"] = grouped.transform(lambda x: x.rolling(4, min_periods=2).std())
    sales_df["sales_vs_avg"] = sales_df["weekly_sales"] / sales_df["rolling_mean_4w"].replace(0, 1)
    
    # Fill NaN values
    sales_df["rolling_std_4w"] = sales_df["rolling_std_4w"].fillna(0)
    sales_df["sales_vs_avg"] = sales_df["sales_vs_avg"].fillna(1.0)
    for lag in [1, 2, 4, 8]:
        sales_df[f"lag_{lag}"] = sales_df[f"lag_{lag}"].fillna(sales_df["rolling_mean_4w"])
    sales_df = sales_df.fillna(0)
    
    # Save parquet files
    print("Saving parquet files...")
    sales_df.to_parquet(f"{data_dir}/sales_features.parquet", index=False)
    
    # Store features
    stores_records = []
    for store_id in range(1, config["stores"] + 1):
        for dept_id in range(1, config["departments"] + 1):
            stores_records.append({
                "store_id": store_id,
                "dept_id": dept_id,
                "event_timestamp": base_date,
                "store_type": ["A", "B", "C"][store_id % 3],
                "store_size": 100000 + store_id * 10000,
                "region": f"region_{(store_id - 1) // 15 + 1}"
            })
    pd.DataFrame(stores_records).to_parquet(f"{data_dir}/store_features.parquet", index=False)
    
    print(f"Generated {len(sales_df):,} records")
    print(f"Files saved to: {data_dir}/")

  # Main execution script
  run.sh: |
    #!/bin/bash
    set -e
    
    DATA_DIR="${DATA_DIR:-/shared/data}"
    FEATURE_REPO="${FEATURE_REPO_DIR:-/shared/feature_repo}"
    
    echo ""
    echo "Configuration:"
    echo "  DATA_DIR: $DATA_DIR"
    echo "  FEATURE_REPO: $FEATURE_REPO"
    
    # Step 1: Generate data
    echo ""
    echo "Step 1: Generate Sales Data"
    echo "============================================================"
    python /scripts/data_generator.py
    
    # Step 2: Setup Feast project
    echo ""
    echo "Step 2: Setup Feast Project"
    echo "============================================================"
    mkdir -p "$FEATURE_REPO"
    mkdir -p "$DATA_DIR/ray_storage"
    rm -f "$FEATURE_REPO"/*.py "$FEATURE_REPO"/*.yaml 2>/dev/null || true
    cp /scripts/feature_store.yaml "$FEATURE_REPO/"
    cp /scripts/features.py "$FEATURE_REPO/"
    echo "Project created: $FEATURE_REPO"
    
    # Step 3: Apply features
    echo ""
    echo "Step 3: feast apply"
    echo "============================================================"
    cd "$FEATURE_REPO"
    feast apply
    echo "Features registered"
    
    # Step 4: Materialize
    echo ""
    echo "Step 4: feast materialize"
    echo "============================================================"
    feast materialize 2022-01-01T00:00:00 $(date -u +%Y-%m-%dT%H:%M:%S)
    echo "Features materialized"
    
    # Step 5: Verify
    echo ""
    echo "Step 5: Verify Features"
    echo "============================================================"
    python - << 'VERIFY'
    from feast import FeatureStore
    
    store = FeatureStore(repo_path=".")
    
    print(f"Entities: {[e.name for e in store.list_entities()]}")
    print(f"FeatureViews: {[fv.name for fv in store.list_feature_views()]}")
    print(f"FeatureServices: {[fs.name for fs in store.list_feature_services()]}")
    
    online = store.get_online_features(
        features=["sales_features:weekly_sales", "sales_features:lag_1"],
        entity_rows=[{"store_id": 1, "dept_id": 1}]
    ).to_dict()
    
    ws = online.get('weekly_sales', [None])[0]
    print(f"Sample: weekly_sales=${ws:,.0f}" if ws else "Sample: N/A")
    print("Feature retrieval working!")
    VERIFY
    
    echo ""
    echo "============================================================"
    echo "FEAST FEATURE STORE READY"
    echo "============================================================"
