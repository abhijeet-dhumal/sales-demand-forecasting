# Feast Data Stores Secret
#
# Configuration for all Feast store backends
#
---
apiVersion: v1
kind: Secret
metadata:
  name: feast-data-stores
  namespace: feast-trainer-demo
  labels:
    app.kubernetes.io/name: feast-data-stores
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: sales-forecasting-mlops
stringData:
  # Redis Online Store Configuration
  redis: |
    connection_string: redis.feast-trainer-demo.svc.cluster.local:6379
  
  # PostgreSQL Registry Configuration (SQL)
  sql: |
    path: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres.feast-trainer-demo.svc.cluster.local:5432/${POSTGRES_DB}
    cache_ttl_seconds: 60
    sqlalchemy_config_kwargs:
        echo: false
        pool_pre_ping: true
  
  # Ray Offline Store Configuration
  ray: |
    storage_path: /feast-data/ray_storage
    use_kuberay: true
    cluster_name: feast-ray
    kuberay_conf:
        namespace: feast-trainer-demo
        skip_tls: true
    broadcast_join_threshold_mb: 100
    enable_distributed_joins: true
    enable_ray_logging: false
