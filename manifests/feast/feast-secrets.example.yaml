# Feast Configuration Secrets Template
#
# This file contains sensitive configuration for Feast components.
# Copy and customize before deploying:
#   cp feast-secrets.example.yaml feast-secrets.yaml
#
# The dataprep job needs these credentials to connect to PostgreSQL.
#
---
# Feast feature_store.yaml configuration with credentials
# This is embedded in the dataprep-scripts-configmap.yaml
#
# When deploying, update the password in dataprep-scripts-configmap.yaml:
#
# online_store:
#   type: postgres
#   host: postgres.feast-trainer-demo.svc.cluster.local
#   port: 5432
#   database: feast
#   user: feast
#   password: <USE_SAME_PASSWORD_AS_POSTGRES_SECRET>
#
# Alternatively, use environment variable substitution in your deployment.
